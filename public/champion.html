<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champion Detail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0f;
            color: #c8aa6e;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        #backButton {
            color: #c8aa6e;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid #c8aa6e;
            padding: 8px 16px;
            border-radius: 4px;
        }

        #backButton:hover {
            background: #c8aa6e;
            color: #0a0a0f;
        }

        #championHeader {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            align-items: flex-start;
        }

        #championHeader img {
            width: 400px;
            border-radius: 8px;
            border: 2px solid #c8aa6e;
        }

        #championInfo h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        #championInfo h3 {
            color: #a0a0a0;
            margin-bottom: 15px;
            font-style: italic;
        }

        #championInfo p {
            line-height: 1.6;
            max-width: 600px;
            margin-bottom: 20px;
        }

        #championStats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #1a1a2e;
            border: 1px solid #c8aa6e;
            border-radius: 8px;
            padding: 10px 20px;
            text-align: center;
        }

        .stat-box h4 {
            font-size: 11px;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 1.3rem;
            color: #c8aa6e;
        }

        #skinsSection {
            margin-top: 40px;
        }

        #skinsSection h2 {
            margin-bottom: 20px;
            border-bottom: 1px solid #c8aa6e;
            padding-bottom: 10px;
        }

        #skinGallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .skin-card {
            background: #1a1a2e;
            border: 1px solid #c8aa6e;
            border-radius: 8px;
            overflow: hidden;
            width: 200px;
            text-align: center;
            transition: transform 0.2s;
        }

        .skin-card:hover {
            transform: scale(1.05);
        }

        .skin-card img {
            width: 100%;
        }

        .skin-card p {
            padding: 8px;
            font-size: 12px;
        }

        
    #championStats {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 400px;
        margin-top: 15px;
    }

    .stat-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .stat-label {
        width: 100px;
        font-size: 12px;
        color: #a0a0a0;
        text-transform: uppercase;
    }

    .stat-bar-container {
        flex: 1;
        background: #1a1a2e;
        border-radius: 4px;
        height: 8px;
        overflow: hidden;
    }

    .stat-bar {
        height: 100%;
        background: #c8aa6e;
        border-radius: 4px;
        transition: width 0.8s ease;
    }

    .stat-value {
        width: 35px;
        font-size: 12px;
        text-align: right;
    }



    </style>
</head>
<body>

    <a href="/" id="backButton">← Back to Champions</a>

    <div id="championHeader">
        <img id="splashArt" src="" alt="Champion Splash Art">
        <div id="championInfo">
            <h1 id="championName"></h1>
            <h3 id="championTitle"></h3>
            <p id="championBlurb"></p>
            <div id="championStats"></div>
        </div>
    </div>

    <div id="skinsSection">
        <h2>Skins</h2>
        <div id="skinGallery"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search)
        const championName = params.get('name')

        async function championInfo() {
            try {
                const response = await fetch(`/champion/${championName}`)
                const champion = await response.json()

                const skinsResponse = await fetch(`/champion/${championName}/skins`)
                const skins = await skinsResponse.json()

                document.getElementById('championName').textContent = champion.name
                document.getElementById('championTitle').textContent = champion.title
                document.getElementById('championBlurb').textContent = champion.lore


                document.getElementById('splashArt').src = champion.splashArt

   
                const stats = document.getElementById('championStats')
stats.innerHTML = `
    <div class="stat-row">
        <span class="stat-label">Health</span>
        <div class="stat-bar-container">
            <div class="stat-bar" style="width: ${(champion.hp / 1200) * 100}%"></div>
        </div>
        <span class="stat-value">${champion.hp}</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Mana</span>
        <div class="stat-bar-container">
            <div class="stat-bar" style="width: ${(champion.mp / 1200) * 100}%"></div>
        </div>
        <span class="stat-value">${champion.mp}</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Armor</span>
        <div class="stat-bar-container">
            <div class="stat-bar" style="width: ${(champion.armor / 200) * 100}%"></div>
        </div>
        <span class="stat-value">${champion.armor}</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Attack</span>
        <div class="stat-bar-container">
            <div class="stat-bar" style="width: ${(champion.attackdamage / 150) * 100}%"></div>
        </div>
        <span class="stat-value">${champion.attackdamage}</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Move Speed</span>
        <div class="stat-bar-container">
            <div class="stat-bar" style="width: ${(champion.movespeed / 500) * 100}%"></div>
        </div>
        <span class="stat-value">${champion.movespeed}</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Magic Res</span>
        <div class="stat-bar-container">
            <div class="stat-bar" style="width: ${(champion.spellblock / 200) * 100}%"></div>
        </div>
        <span class="stat-value">${champion.spellblock}</span>
    </div>
`

                const skinGallery = document.getElementById('skinGallery')
                skins.forEach(skin => {
                    const skinCard = document.createElement('div')
                    skinCard.className = 'skin-card'
                    skinCard.innerHTML = `
                        <img src="${skin.skinURL}" alt="${skin.skinURL}">
                        <p>${skin.skinName}</p>
                    `
                    skinGallery.appendChild(skinCard)
                })
                skinGallery.addEventListener('click', (event) => {
                    if (event.target.tagName === 'IMG') {
                        const skinSrc = event.target.getAttribute('src')
                        window.location.href = skinSrc
                    }
                })
        

            } catch(error) {
                console.error("Error fetching Champion Data: ", error)
            }
        }

        championInfo()
    </script>

</body>
</html>
