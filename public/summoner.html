<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summoner</title>
    <style>
    </style>
</head>
<body>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const summonerName = urlParams.get('name');
        const tagLine = urlParams.get('tag');

        console.log(summonerName, tagLine);

async function getSummonerInfo() {
    try {
        const summonerResponse = await fetch(`/summoner/${summonerName}/${tagLine}`)
        const summonerData = await summonerResponse.json()
        console.log(summonerData)
    } catch(error) {
        console.error('Error fetching summoner:', error)
    }
}

    getSummonerInfo();

    </script>
</body>
</html>
