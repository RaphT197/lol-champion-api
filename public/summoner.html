<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="stylesheet.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summoner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0f;
            color: #c8aa6e;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 780px;
            margin: 0 auto;
        }

        #backButton {
            color: #c8aa6e;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid #c8aa6e;
            padding: 8px 16px;
            border-radius: 4px;
        }

        #backButton:hover {
            background: #c8aa6e;
            color: #0a0a0f;
        }

        #summonerHeader {
            display: flex;
            align-items: center;
            gap: 24px;
            background: #1a1a2e;
            border: 1px solid #c8aa6e;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 32px;
        }

        #profileIcon img {
            border-radius: 50%;
            border: 3px solid #c8aa6e;
            display: block;
        }

        #summonerInfo {
            flex: 1;
        }

        #summonerInfo h1 {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        #summonerLevel {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 0;
        }

        #winRate {
            width: 110px;
            aspect-ratio: 1;
            border-radius: 50%;
            background: conic-gradient(#3bef6e calc(var(--p) * 1%), #f14141 0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        #winRate::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 68%;
            height: 68%;
            border-radius: 50%;
            background: #1a1a2e;
        }

        #winRateText {
            position: relative;
            z-index: 1;
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #c8aa6e;
            line-height: 1.4;
        }

        #matchSection h2 {
            margin-bottom: 20px;
            border-bottom: 1px solid #c8aa6e;
            padding-bottom: 10px;
        }

        #matchList {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        @media (max-width: 520px) {
            #summonerHeader {
                flex-direction: column;
                text-align: center;
            }
        }

        .match-card {
            background: #1a1a2e;
            border: 1px solid #c8aa6e;
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 13px;
            font-family: monospace;
            color: #c8aa6e;
            cursor: pointer;
            user-select: none;
        }

        .match-card:hover {
            background: #22223a;
        }

        .match-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .match-card-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .match-chevron {
            font-size: 10px;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .match-card.expanded .match-chevron {
            transform: rotate(180deg);
        }

        .match-details {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding-top 0.3s ease, margin-top 0.3s ease;
        }

        .match-card.expanded .match-details {
            max-height: 200px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #3a3a5a;
        }

        .match-stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .match-stat-label {
            color: #a0a0a0;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .match-stat-value {
            color: #c8aa6e;
            font-size: 14px;
            font-weight: bold;
        }

        .match-result-win { color: #5dbb63; }
        .match-result-loss { color: #e06c75; }

        #errorMsg {
            color: #e06c75;
            font-size: 1.2rem;
            margin-top: 40px;
        }

        #loading {
            color: #a0a0a0;
            margin-top: 40px;
        }
    </style>
</head>
<body>
<div class="container">

    <a href="/" id="backButton">← Back to Champions</a>

    <div id="loading">Loading summoner data...</div>
    <div id="errorMsg" style="display:none;"></div>

    <div id="summonerHeader" style="display:none;">
        <div id="profileIcon"></div>
        <div id="summonerInfo">
            <h1 id="summonerName"></h1>
            <p id="summonerLevel"></p>
        </div>
        <div id="winRate">
            <div id="winRateText">Win Rate</div>
        </div>
    </div>

    <div id="matchSection" style="display:none;">
        <h2>Recent Matches</h2>
        <div id="matchList"></div>
    </div>

</div>

    <script>

        const urlParams = new URLSearchParams(window.location.search);
        const summonerName = urlParams.get('name');
        const tagLine = urlParams.get('tag');

        async function getSummonerInfo() {
            try {

                const QUEUE_NAMES = {                                                                                        
                    420: 'Ranked Solo/Duo',                               
                    440: 'Ranked Flex',                                                                                      
                    400: 'Normal Draft',                                  
                    430: 'Normal Blind',
                    450: 'ARAM',                                                                                             
                    900: 'URF',
                    0: 'Custom'
                };  

                const response = await fetch(`/summoner/${summonerName}/${tagLine}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to fetch summoner.');
                }

                if (!data.summonerData) {
                    throw new Error('Failed to fetch summoner data.');
                }

                const championsResponse = await fetch('/champions');
                const championsData = await championsResponse.json();
                const championIconMap = {};
                championsData.forEach(champ => {
                    championIconMap[champ.id] = champ.sprite;
                });

                const puuid = data.summonerData.puuid;

                const summonerResponse = await fetch(`/lol/summoner/v4/summoners/by-puuid/${puuid}`);
                const summonerData = await summonerResponse.json();
                const summonerIcon = summonerData.profileIconId;
                const summonerIconImg = `https://ddragon.leagueoflegends.com/cdn/16.9.1/img/profileicon/${summonerIcon}.png`;

                if (!summonerResponse.ok) {
                    throw new Error(data.error || 'Failed to fetch summoner.');
                }

                document.getElementById('loading').style.display = 'none';

                document.getElementById('summonerName').textContent = data.summonerGameName;
                document.getElementById('summonerLevel').textContent = `Level: ${summonerData.summonerLevel}`;
                document.getElementById('profileIcon').innerHTML = `<img src="${summonerIconImg}" width ="120" height="120" alt="Profile Icon" />`;
                document.getElementById('summonerHeader').style.display = 'flex';


                const allMatchInfo = await Promise.all(data.matchIds.map(id => matchData(id)));

                // Some fetches may fail (rate limit) — filter to only ones with valid data
                const validMatches = allMatchInfo.filter(m => m.info && m.info.participants);

                // Calculate once, outside the loop
                const wins = validMatches.filter(m => m.info.participants.find(p => p.puuid === puuid)?.win).length;
                const winRate = ((wins / validMatches.length) * 100).toFixed(1);

                // Apply the CSS variable so the circle actually renders
                const losses = validMatches.length - wins;
                const winRateEl = document.getElementById('winRate');
                winRateEl.style.setProperty('--p', winRate);
                document.getElementById('winRateText').innerHTML = `${wins}W / ${losses}L<br><span style="font-size:0.7rem;color:#a0a0a0">${winRate}%</span>`;

                const matchList = document.getElementById('matchList');
                validMatches.forEach((matchInfo, index) => {
                    const queueName = QUEUE_NAMES[matchInfo.info.queueId] || matchInfo.info.gameMode;
                    const participant = matchInfo.info.participants.find(p => p.puuid === puuid);
                    const enemyTeam = matchInfo.info.participants.filter(p => p.teamId !== participant.teamId);
                    const allyTeam = matchInfo.info.participants.filter(p => p.teamId === participant.teamId);
                    const champName = participant.championName;
                    const matchDuration = Math.floor(matchInfo.info.gameDuration / 60);
                    const matchDurationSecond = matchInfo.info.gameDuration % 60;
                    const won = participant.win;
                    const lost = participant.loss;
                    const kda = `${participant.kills}/${participant.deaths}/${participant.assists}`;
                    const cs = participant.totalMinionsKilled + participant.neutralMinionsKilled;
                    const gold = participant.goldEarned.toLocaleString();
                    const damage = participant.totalDamageDealtToChampions.toLocaleString();
                    const vision = participant.visionScore;


                    const card = document.createElement('div');
                    card.className = 'match-card';

                    const header = document.createElement('div');
                    header.className = 'match-card-header';

                    const headerLeft = document.createElement('div');
                    headerLeft.className = 'match-card-header-left';

                    const img = document.createElement('img');
                    img.src = championIconMap[champName] || '';
                    img.width = 32;
                    img.height = 32;

                    const info = document.createElement('div');
                    const date = new Date(matchInfo.info.gameStartTimestamp).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                    info.innerHTML = `<div style="font-weight:bold;font-size:14px;">${champName}</div><div style="color:#a0a0a0;font-size:11px;margin-top:2px;">${queueName} &middot; ${matchDuration}m ${matchDurationSecond}s &middot; ${date}</div>`;

                    const resultBadge = document.createElement('span');
                    resultBadge.textContent = won ? 'WIN' : 'LOSS';
                    resultBadge.className = won ? 'match-result-win' : 'match-result-loss';

                    const chevron = document.createElement('span');
                    chevron.className = 'match-chevron';
                    chevron.textContent = '▼';

                    headerLeft.appendChild(img);
                    headerLeft.appendChild(info);
                    header.appendChild(headerLeft);

                    const headerRight = document.createElement('div');
                    headerRight.style.display = 'flex';
                    headerRight.style.alignItems = 'center';
                    headerRight.style.gap = '12px';
                    headerRight.appendChild(resultBadge);
                    headerRight.appendChild(chevron);
                    header.appendChild(headerRight);

                    card.appendChild(header);

                    const details = document.createElement('div');
                    details.className = 'match-details';
                    details.innerHTML = `
                        <div class="match-stat">
                            <span class="match-stat-label">KDA</span>
                            <span class="match-stat-value">${kda}</span>
                        </div>
                        <div class="match-stat">
                            <span class="match-stat-label">CS</span>
                            <span class="match-stat-value">${cs}</span>
                        </div>
                        <div class="match-stat">
                            <span class="match-stat-label">Gold</span>
                            <span class="match-stat-value">${gold}</span>
                        </div>
                        <div class="match-stat">
                            <span class="match-stat-label">Ally Team</span>
                            <span class="match-stat-value">${allyTeam.map(p => p.championName).join(', ')}</span>
                        </div>
                        <div class="match-stat">
                            <span class="match-stat-label">Enemy Team</span>
                            <span class="match-stat-value">${enemyTeam.map(p => p.championName).join(', ')}</span>
                        </div>
                        <div class="match-stat">
                            <span class="match-stat-label">Damage</span>
                            <span class="match-stat-value">${damage}</span>
                        </div>
                        <div class="match-stat">
                            <span class="match-stat-label">Vision</span>
                            <span class="match-stat-value">${vision}</span>
                        </div>
                    `;
                    card.appendChild(details);

                    card.addEventListener('click', () => {
                        card.classList.toggle('expanded');
                    });

                    matchList.appendChild(card);
                });
                document.getElementById('matchSection').style.display = 'block';

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                const errEl = document.getElementById('errorMsg');
                errEl.textContent = error.message;
                errEl.style.display = 'block';
            }
        }


        async function matchData(id) {
            const response = await fetch(`/lol/match/v5/matches/${id}`);
            return await response.json();
        }

        getSummonerInfo();
    </script>
</body>
</html>
